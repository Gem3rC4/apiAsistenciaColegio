<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Warehouse | Sagrado Corazón de Jesús</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        if (!localStorage.getItem('tokenColegio')) {
            window.location.replace('login.html');
        }
    </script>

    <style>
        :root {
            --verde-oscuro: #1b5e20;
            --verde-claro: #4caf50;
            --fondo: #f4f9f4;
            --blanco: #ffffff;
            --texto: #333333;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

            .header h1 {
                color: var(--verde-oscuro);
                margin: 0 0 10px 0;
            }

        .btn-volver {
            background-color: #555;
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            position: absolute;
            left: 20px;
            top: 20px;
        }

        .dashboard-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            flex-wrap: wrap;
        }

        .panel {
            background: var(--blanco);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.1);
            border-top: 5px solid var(--verde-claro);
            flex: 1;
            min-width: 300px;
        }

            .panel h2 {
                color: var(--verde-oscuro);
                margin-top: 0;
                border-bottom: 2px solid #eee;
                padding-bottom: 10px;
            }

        /* Estilos de tabla */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #e8f5e9;
            color: var(--verde-oscuro);
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        /* Formularios */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            color: var(--verde-oscuro);
            display: block;
            margin-bottom: 5px;
        }

        select, input[type="file"] {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button.btn-accion {
            background-color: var(--verde-oscuro);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

            button.btn-accion:hover {
                background-color: #144d18;
            }
    </style>
</head>
<body>

    <div class="header">
        <h1>Gestión de Data Warehouse</h1>
        <p>Unificación y carga de datos de estudiantes</p>
    </div>

    <div class="dashboard-container">
        <div class="panel" style="flex: 1;">
            <h2>🔎 Consultar Alumnos (Data Warehouse)</h2>

            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label>Filtrar por Grado:</label>
                    <select id="filtroGrado">
                        <option value="ex_PrimeroBasico">Primero Básico</option>
                        <option value="ex_SegundoBasico">Segundo Básico</option>
                        <option value="ex_TerceroBasico">Tercero Básico</option>
                        <option value="ex_CuartoBachillerato">Cuarto Bachillerato</option>
                        <option value="ex_QuintoBachillerato">Quinto Bachillerato</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>Filtrar por Sección:</label>
                    <select id="filtroSeccion">
                        <option value="TODAS">Todas</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                    </select>
                </div>
                <div style="flex: 0.5; display: flex; align-items: flex-end;">
                    <button class="btn-accion" onclick="cargarTablaDW()">Filtrar</button>
                </div>
            </div>

            <div style="max-height: 400px; overflow-y: auto;">
                <table id="tablaDW">
                    <thead>
                        <tr>
                            <th>Nombres y Apellidos</th>
                            <th>Grado</th>
                            <th>Sección</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTablaDW">
                        <tr><td colspan="4" style="text-align: center;">Seleccione un grado y presione filtrar...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function cargarTablaDW() {
            const tabla = document.getElementById('filtroGrado').value;
            const seccion = document.getElementById('filtroSeccion').value;
            const tbody = document.getElementById('cuerpoTablaDW');

            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Consultando base de datos...</td></tr>';

            try {
                const res = await fetch(`/api/dw/consulta?tabla=${tabla}&seccion=${seccion}`);
                const data = await res.json();
                tbody.innerHTML = '';

                data.forEach(item => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${item.nombreCompleto}</td>
                            <td>${item.grado}</td>
                            <td>${item.seccion}</td>
                            <td>${item.estado}</td>
                        </tr>
                    `;
                });
            } catch (error) {
                Swal.fire('Error', 'No se pudo conectar a la base de datos.', 'error');
            }
        }
    </script>
</body>
</html>
