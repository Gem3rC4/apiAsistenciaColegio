<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Sagrado Corazón de Jesús</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --verde-oscuro: #1b5e20;
            --verde-claro: #4caf50;
            --fondo: #f4f9f4;
            --blanco: #ffffff;
            --texto: #333333;
            --borde: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: var(--blanco);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(76, 175, 80, 0.15);
            border-top: 5px solid var(--verde-claro);
            text-align: center;
            box-sizing: border-box;
            margin: 20px;
        }

        .login-header h1 {
            color: var(--verde-oscuro);
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
            margin: 0 0 30px 0;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

            .form-group label {
                display: block;
                font-weight: bold;
                margin-bottom: 8px;
                color: var(--verde-oscuro);
                font-size: 14px;
            }

            .form-group input {
                width: 100%;
                padding: 12px 15px;
                border: 2px solid var(--borde);
                border-radius: 8px;
                font-size: 16px;
                outline: none;
                box-sizing: border-box;
                transition: border-color 0.3s;
            }

                .form-group input:focus {
                    border-color: var(--verde-claro);
                }

        .password-wrapper {
            position: relative;
            width: 100%;
        }

            .password-wrapper input {
                padding-right: 45px;
            }

        .btn-toggle-password {
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            color: #888;
            transition: color 0.3s;
        }

            .btn-toggle-password:hover {
                color: var(--verde-claro);
            }

        .btn-login {
            background-color: var(--verde-oscuro);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s, transform 0.2s;
            margin-top: 10px;
        }

            .btn-login:hover {
                background-color: #144d18;
                transform: translateY(-2px);
            }
    </style>
</head>
<body>

    <main class="login-container">
        <header class="login-header">
            <img src="https://cdn-icons-png.flaticon.com/512/1157/1157006.png" alt="Logo Colegio" style="width: 80px; margin-bottom: 15px; opacity: 0.9;">
            <h1>Sistema de Asistencia</h1>
            <p>Colegio Sagrado Corazón de Jesús</p>
        </header>

        <form id="formLogin" onsubmit="procesarLogin(event)">
            <div class="form-group">
                <label for="txtUsuario">Usuario</label>
                <input type="text" id="txtUsuario" placeholder="Ingrese su usuario" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label for="txtPassword">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="txtPassword" placeholder="Ingrese su contraseña" required>
                    <button type="button" id="btnTogglePassword" class="btn-toggle-password" title="Mostrar/Ocultar contraseña">
                        <svg id="iconoOjo" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login" id="btnIngresar">Ingresar</button>
        </form>

        <p id="linkRegistro" style="margin-top: 15px; font-size: 14px;">
            ¿No tienes cuenta? <a href="#" onclick="toggleFormularios()" style="color: var(--verde-claro); text-decoration: none; font-weight: bold;">Regístrate aquí</a>
        </p>

        <form id="formRegistro" onsubmit="procesarRegistro(event)" style="display: none;">
            <div class="form-group">
                <label for="txtRegNombre">Nombre Completo</label>
                <input type="text" id="txtRegNombre" placeholder="Ej. Juan Pérez" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label for="txtRegUsuario">Nuevo Usuario</label>
                <input type="text" id="txtRegUsuario" placeholder="Crea un nombre de usuario" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label for="cmbRegRol">Tipo de Usuario / Rol</label>
                <select id="cmbRegRol" style="width: 100%; padding: 12px 15px; border: 2px solid var(--borde); border-radius: 8px; font-size: 16px; outline: none; background-color: white; box-sizing: border-box; transition: border-color 0.3s;">
                    <option value="Alumno">Alumno (Escanear QR, Alerta Riesgo)</option>
                    <option value="Padre">Padre de Familia (Justificaciones, Consultar Estado)</option>
                    <option value="Maestro">Maestro (Asignar Encargados, Reportes)</option>
                    <option value="Administrador">Administrador (Acceso Completo)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="txtRegPassword">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="txtRegPassword" placeholder="Crea tu contraseña" required>
                </div>
            </div>

            <button type="submit" class="btn-login" id="btnRegistrar">Crear Cuenta</button>

            <p style="margin-top: 15px; font-size: 14px;">
                ¿Ya tienes cuenta? <a href="#" onclick="toggleFormularios()" style="color: var(--verde-claro); text-decoration: none; font-weight: bold;">Inicia Sesión</a>
            </p>
        </form>
    </main>

    <script>
        // Lógica del ojito de la contraseña
        document.getElementById('btnTogglePassword').addEventListener('click', function () {
            const passwordInput = document.getElementById('txtPassword');
            const iconoOjo = document.getElementById('iconoOjo');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                iconoOjo.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            } else {
                passwordInput.type = 'password';
                iconoOjo.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            }
        });

        // Función para alternar entre Login y Registro
        function toggleFormularios() {
            const formLogin = document.getElementById('formLogin');
            const formRegistro = document.getElementById('formRegistro');
            const linkRegistro = document.getElementById('linkRegistro');
            const titulo = document.querySelector('.login-header h1');

            if (formLogin.style.display === 'none') {
                formLogin.style.display = 'block';
                linkRegistro.style.display = 'block';
                formRegistro.style.display = 'none';
                titulo.textContent = 'Sistema de Asistencia';
            } else {
                formLogin.style.display = 'none';
                linkRegistro.style.display = 'none';
                formRegistro.style.display = 'block';
                titulo.textContent = 'Crear Cuenta';
            }
        }

        // Función de Login
        async function procesarLogin(event) {
            event.preventDefault();

            const usuario = document.getElementById("txtUsuario").value.trim();
            const password = document.getElementById("txtPassword").value.trim();
            const btnIngresar = document.getElementById("btnIngresar");

            btnIngresar.textContent = "Verificando...";
            btnIngresar.disabled = true;

            try {
                const response = await fetch('/api/login/entrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: usuario, password: password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('tokenColegio', data.token);
                    localStorage.setItem('nombreUsuario', data.nombre);
                    localStorage.setItem('rolUsuario', data.rol);
                    window.location.href = 'index.html';
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Acceso Denegado',
                        text: data.mensaje || 'Usuario o contraseña incorrectos.',
                        confirmButtonColor: '#1b5e20'
                    });
                }
            } catch (error) {
                console.error('Error de red:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'Error del Servidor',
                    text: 'No se pudo contactar al servidor. Revisa tu conexión.',
                    confirmButtonColor: '#c62828'
                });
            } finally {
                btnIngresar.textContent = "Ingresar";
                btnIngresar.disabled = false;
            }
        }

        // Función de Registro
        async function procesarRegistro(event) {
            event.preventDefault();

            const nombre = document.getElementById("txtRegNombre").value.trim();
            const usuario = document.getElementById("txtRegUsuario").value.trim();
            const password = document.getElementById("txtRegPassword").value.trim();
            const rol = document.getElementById("cmbRegRol").value; 
            const btnRegistrar = document.getElementById("btnRegistrar");

            btnRegistrar.textContent = "Registrando...";
            btnRegistrar.disabled = true;

            try {
                const response = await fetch('/api/login/registrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombreCompleto: nombre, usuario: usuario, password: password, rol: rol })
                });

                const data = await response.json();

                if (response.ok) {
                    Swal.fire({
                        icon: 'success',
                        title: '¡Registro Exitoso!',
                        text: 'Ahora puedes iniciar sesión con tus nuevas credenciales.',
                        confirmButtonColor: '#1b5e20'
                    }).then(() => {
                        document.getElementById("formRegistro").reset();
                        toggleFormularios();
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: data.mensaje || 'No se pudo crear la cuenta.',
                        confirmButtonColor: '#c62828'
                    });
                }
            } catch (error) {
                console.error('Error de red:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'Error del Servidor',
                    text: 'No se pudo contactar al servidor.',
                    confirmButtonColor: '#c62828'
                });
            } finally {
                btnRegistrar.textContent = "Crear Cuenta";
                btnRegistrar.disabled = false;
            }
        }
    </script>
</body>
</html>
